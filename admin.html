<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>i-Cheap - Admin</title>
    <link rel="stylesheet" href="css/admin.css" />
    <link rel="icon" href="data:," />
  </head>
  <body>
    <header class="topbar">
      <a class="back" href="index.html">Kembali</a>
      <div class="title">Admin</div>
      <div class="spacer"></div>
    </header>

    <main class="container">
      <section class="panel">
        <div class="panel-head">
          <div class="panel-title">Tambah / Edit Produk</div>
          <button id="btnReset" class="btn btn-ghost" type="button">Reset</button>
        </div>

        <form id="formProduct" class="form">
          <input id="productId" type="hidden" value="" />

          <label class="field">
            <div class="label">Nama Barang</div>
            <input id="name" class="input" type="text" autocomplete="off" />
          </label>

          <div class="field">
            <div class="label">Foto Cover (1:1)</div>
            <input id="coverFile" class="input" type="file" accept="image/*" />
            <div id="coverPreview" class="img-preview"></div>
          </div>

          <div class="row">
            <label class="field">
              <div class="label">Harga Ori</div>
              <input id="priceOld" class="input" type="number" inputmode="numeric" min="0" />
            </label>

            <label class="field">
              <div class="label">Harga Jual</div>
              <input id="priceNew" class="input" type="number" inputmode="numeric" min="0" />
            </label>
          </div>

          <label class="field switch">
            <input id="isHighlight" type="checkbox" />
            <span class="switch-ui"></span>
            <span class="switch-text">Jadikan Highlight (maks 3)</span>
          </label>

          <label class="field">
            <div class="label">Detail Produk (paragraf)</div>
            <textarea id="detailText" class="textarea" rows="5"></textarea>
          </label>

          <label class="field field-date">
            <div class="label">Tanggal Penawaran Berakhir</div>
            <input id="offerEndsText" class="input" type="text" inputmode="numeric" readonly />
            <input id="offerEnds" class="input" type="date" />
          </label>

          <section class="field">
            <div class="label">Gambar Slider (16:9)</div>
            <div class="slider-controls">
              <input id="sliderFile" class="input" type="file" accept="image/*" />
              <button id="btnAddSlider" class="btn" type="button">Add</button>
            </div>
            <div id="sliderPreview" class="slider-preview"></div>
          </section>

          <div class="actions">
            <button id="btnSave" class="btn btn-primary" type="submit">Simpan</button>
          </div>
        </form>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div class="panel-title">Daftar Produk</div>
        </div>
        <div id="list" class="list"></div>
      </section>
    </main>

    <script src="js/admin.js" type="module"></script>
  </body>
</html>
